name: 'Repro: overrides not read from pnpm-workspace.yaml'
on: [push, workflow_dispatch]

jobs:
  aube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.9

      - name: aube install
        working-directory: overrides-not-read-from-workspace
        run: aube install

      - name: aube install --frozen-lockfile should pass
        working-directory: overrides-not-read-from-workspace
        run: aube install --frozen-lockfile

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: pnpm install
        working-directory: overrides-not-read-from-workspace
        run: pnpm install

      - name: pnpm install --frozen-lockfile should pass
        working-directory: overrides-not-read-from-workspace
        run: pnpm install --frozen-lockfile
