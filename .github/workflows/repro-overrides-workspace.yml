name: 'Repro: overrides not read from pnpm-workspace.yaml'
on: [push, workflow_dispatch]

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.9

      - name: Install pnpm (for comparison)
        run: npm install -g pnpm@10

      - name: 'aube install (writes overrides to lockfile)'
        working-directory: overrides-not-read-from-workspace
        run: aube install

      - name: 'aube install --frozen-lockfile (EXPECTED: pass)'
        working-directory: overrides-not-read-from-workspace
        run: |
          aube install --frozen-lockfile || echo "FAILED: --frozen-lockfile says lockfile is stale"

      - name: Clean for pnpm comparison
        working-directory: overrides-not-read-from-workspace
        run: rm -rf node_modules pnpm-lock.yaml aube-lock.yaml

      - name: 'pnpm install + pnpm install --frozen-lockfile (correct behavior)'
        working-directory: overrides-not-read-from-workspace
        run: |
          pnpm install
          pnpm install --frozen-lockfile && echo "PASSED: pnpm reads overrides from workspace yaml"
