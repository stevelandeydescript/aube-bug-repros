name: 'Repro: --filter skips root devDependencies'
on: [push, workflow_dispatch]

jobs:
  aube:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.10

      - name: 'aube install --filter @repro/app...'
        working-directory: filter-skips-root-deps
        run: aube install --filter '@repro/app...'

      - name: Root devDep should be resolvable
        working-directory: filter-skips-root-deps
        run: node test.js

  pnpm:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: 'pnpm install --filter @repro/app...'
        working-directory: filter-skips-root-deps
        run: pnpm install --filter '@repro/app...'

      - name: Root devDep should be resolvable
        working-directory: filter-skips-root-deps
        run: node test.js
