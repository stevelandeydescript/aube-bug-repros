name: 'Repro: npm: alias + override conflict'
on: [push, workflow_dispatch]

jobs:
  aube:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.9

      - name: aube install
        working-directory: alias-override-conflict
        run: aube install

      - name: Assert immer is @descript/immer@6.0.9-patched.1
        working-directory: alias-override-conflict
        run: |
          NAME=$(node -e "console.log(require('./node_modules/immer/package.json').name)")
          VERSION=$(node -e "console.log(require('./node_modules/immer/package.json').version)")
          echo "Installed: $NAME@$VERSION"
          echo ""
          echo "Lockfile entry:"
          grep -A2 'immer:' aube-lock.yaml || grep -A2 'immer:' pnpm-lock.yaml || true
          echo ""
          if [ "$NAME" != "@descript/immer" ] || [ "$VERSION" != "6.0.9-patched.1" ]; then
            echo "FAIL: expected @descript/immer@6.0.9-patched.1, got $NAME@$VERSION"
            exit 1
          fi

  pnpm:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: pnpm install
        working-directory: alias-override-conflict
        run: pnpm install

      - name: Assert immer is @descript/immer@6.0.9-patched.1
        working-directory: alias-override-conflict
        run: |
          NAME=$(node -e "console.log(require('./node_modules/immer/package.json').name)")
          VERSION=$(node -e "console.log(require('./node_modules/immer/package.json').version)")
          echo "Installed: $NAME@$VERSION"
          if [ "$NAME" != "@descript/immer" ] || [ "$VERSION" != "6.0.9-patched.1" ]; then
            echo "FAIL: expected @descript/immer@6.0.9-patched.1, got $NAME@$VERSION"
            exit 1
          fi
