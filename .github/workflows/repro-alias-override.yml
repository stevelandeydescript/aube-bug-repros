name: 'Repro: npm: alias + override conflict'
on: [push, workflow_dispatch]

jobs:
  repro:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g aube@1.0.0-beta.9

      - name: Install pnpm (for comparison)
        run: npm install -g pnpm@10

      - name: 'aube install'
        working-directory: alias-override-conflict
        run: aube install

      - name: 'aube result (EXPECTED: @descript/immer 6.0.9-patched.1)'
        working-directory: alias-override-conflict
        run: |
          echo "=== Installed package ==="
          node -e "const p = require('./node_modules/immer/package.json'); console.log(p.name, p.version)"
          echo ""
          echo "=== Lockfile specifier ==="
          grep -A2 'immer:' aube-lock.yaml || grep -A2 'immer:' pnpm-lock.yaml || echo "no lockfile found"

      - name: Clean for pnpm comparison
        working-directory: alias-override-conflict
        run: rm -rf node_modules aube-lock.yaml pnpm-lock.yaml

      - name: 'pnpm install (for comparison)'
        working-directory: alias-override-conflict
        run: pnpm install

      - name: 'pnpm result (correct behavior)'
        working-directory: alias-override-conflict
        run: |
          echo "=== Installed package ==="
          node -e "const p = require('./node_modules/immer/package.json'); console.log(p.name, p.version)"
