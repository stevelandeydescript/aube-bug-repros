name: 'Repro: temporal Duration type mismatch'
on: [push, workflow_dispatch]

jobs:
  aube:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.10

      - name: aube install
        working-directory: temporal-duration-type
        run: aube install

      - name: TypeScript should compile cleanly
        working-directory: temporal-duration-type/packages/app
        run: npx tsc --noEmit

  pnpm:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: pnpm install
        working-directory: temporal-duration-type
        run: pnpm install

      - name: TypeScript should compile cleanly
        working-directory: temporal-duration-type/packages/app
        run: npx tsc --noEmit
