name: 'Repro: pnpm-lock.yaml host-only platform deps'
on: [push, workflow_dispatch]

jobs:
  generate-on-linux-install-on-macos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.10

      - name: Regenerate pnpm-lock.yaml with aube on Linux
        working-directory: pnpm-lockfile-host-only-platforms
        run: aube install --no-frozen-lockfile

      - name: Assert pnpm-lock.yaml has darwin-arm64 entries
        working-directory: pnpm-lockfile-host-only-platforms
        run: |
          echo "=== @esbuild platform packages in pnpm-lock.yaml ==="
          grep '@esbuild/' pnpm-lock.yaml | grep -v '#' | sort -u
          echo ""
          if ! grep -q '@esbuild/darwin-arm64' pnpm-lock.yaml; then
            echo "FAIL: pnpm-lock.yaml is missing @esbuild/darwin-arm64"
            echo "A macOS developer using this lockfile will not get esbuild's native binary."
            exit 1
          fi

      - name: Upload lockfile for cross-platform test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aube-generated-lockfile
          path: pnpm-lockfile-host-only-platforms/pnpm-lock.yaml

  install-on-macos:
    needs: generate-on-linux-install-on-macos
    if: always()
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.10

      - name: Replace lockfile with Linux-generated one
        uses: actions/download-artifact@v4
        with:
          name: aube-generated-lockfile
          path: pnpm-lockfile-host-only-platforms/

      - name: Install from Linux-generated lockfile on macOS
        working-directory: pnpm-lockfile-host-only-platforms
        run: aube install --frozen-lockfile

      - name: Assert esbuild works
        working-directory: pnpm-lockfile-host-only-platforms
        run: npx esbuild --version

  pnpm-comparison:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Regenerate pnpm-lock.yaml with pnpm on Linux
        working-directory: pnpm-lockfile-host-only-platforms
        run: pnpm install --no-frozen-lockfile

      - name: Assert pnpm-lock.yaml has darwin-arm64 entries
        working-directory: pnpm-lockfile-host-only-platforms
        run: |
          echo "=== @esbuild platform packages in pnpm-lock.yaml ==="
          grep '@esbuild/' pnpm-lock.yaml | grep -v '#' | sort -u
          echo ""
          if ! grep -q '@esbuild/darwin-arm64' pnpm-lock.yaml; then
            echo "FAIL: pnpm lockfile missing darwin-arm64 (unexpected)"
            exit 1
          fi
          echo "PASS: pnpm includes all platforms"
