name: 'Repro: pnpm-lock.yaml host-only platform deps'
on: [push, workflow_dispatch]

jobs:
  generate-on-linux-install-on-macos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.9

      - name: Generate lockfile on Linux
        working-directory: pnpm-lockfile-host-only-platforms
        run: aube install

      - name: Assert lockfile has darwin-arm64 entries
        working-directory: pnpm-lockfile-host-only-platforms
        run: |
          LOCKFILE=$(ls pnpm-lock.yaml aube-lock.yaml 2>/dev/null | head -1)
          echo "Lockfile: $LOCKFILE"
          echo ""
          echo "=== @esbuild platform packages ==="
          grep '@esbuild/' "$LOCKFILE" | grep -v '#' | sort -u
          echo ""
          if ! grep -q '@esbuild/darwin-arm64' "$LOCKFILE"; then
            echo "FAIL: lockfile is missing @esbuild/darwin-arm64"
            echo "A macOS developer using this lockfile will not get esbuild's native binary."
            exit 1
          fi

      - name: Upload lockfile for cross-platform test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-lockfile
          path: |
            pnpm-lockfile-host-only-platforms/pnpm-lock.yaml
            pnpm-lockfile-host-only-platforms/aube-lock.yaml

  install-on-macos:
    needs: generate-on-linux-install-on-macos
    if: always()
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aube
        run: npm install -g @endevco/aube@1.0.0-beta.9

      - name: Download lockfile generated on Linux
        uses: actions/download-artifact@v4
        with:
          name: generated-lockfile
          path: pnpm-lockfile-host-only-platforms/

      - name: Install from Linux-generated lockfile on macOS
        working-directory: pnpm-lockfile-host-only-platforms
        run: aube install --frozen-lockfile

      - name: Assert esbuild works
        working-directory: pnpm-lockfile-host-only-platforms
        run: npx esbuild --version

  pnpm-comparison:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Generate lockfile with pnpm
        working-directory: pnpm-lockfile-host-only-platforms
        run: pnpm install

      - name: Assert lockfile has darwin-arm64 entries
        working-directory: pnpm-lockfile-host-only-platforms
        run: |
          echo "=== @esbuild platform packages ==="
          grep '@esbuild/' pnpm-lock.yaml | grep -v '#' | sort -u
          echo ""
          if ! grep -q '@esbuild/darwin-arm64' pnpm-lock.yaml; then
            echo "FAIL: pnpm lockfile missing darwin-arm64 (unexpected)"
            exit 1
          fi
          echo "PASS: pnpm includes all platforms"
